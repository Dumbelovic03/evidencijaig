<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evidencija Kolokvijuma</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e12;
    --surface: #16161d;
    --surface2: #1e1e28;
    --border: #2a2a38;
    --accent: #7c6af7;
    --accent2: #f7c26a;
    --danger: #f76a6a;
    --success: #6af7a8;
    --text: #e8e8f0;
    --muted: #6a6a80;
    --mono: 'Space Mono', monospace;
    --sans: 'Syne', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    padding: 0;
  }

  /* ---- HEADER ---- */
  header {
    padding: 2rem 2.5rem 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    flex-wrap: wrap;
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-size: 1.25rem;
    font-weight: 800;
    letter-spacing: -0.03em;
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .logo-icon {
    width: 36px;
    height: 36px;
    background: var(--accent);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  .stats-bar {
    display: flex;
    gap: 1.5rem;
    font-family: var(--mono);
    font-size: 0.75rem;
  }

  .stat {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }

  .stat-val {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--accent2);
  }

  .stat-label {
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  /* ---- TABS ---- */
  .tabs {
    display: flex;
    gap: 0;
    padding: 0 2.5rem;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }

  .tab {
    padding: 0.9rem 1.5rem;
    cursor: pointer;
    font-weight: 600;
    font-size: 0.85rem;
    color: var(--muted);
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
    letter-spacing: 0.02em;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
    font-family: var(--sans);
  }

  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* ---- MAIN ---- */
  .main {
    padding: 2rem 2.5rem;
    max-width: 1400px;
  }

  .view { display: none; }
  .view.active { display: block; }

  /* ---- FORM ---- */
  .form-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 2rem;
    max-width: 720px;
  }

  .form-title {
    font-size: 1.1rem;
    font-weight: 700;
    margin-bottom: 1.5rem;
    color: var(--accent2);
    letter-spacing: -0.02em;
  }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }

  .form-group.full { grid-column: 1 / -1; }

  label {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    font-weight: 700;
    font-family: var(--mono);
  }

  input, select, textarea {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.65rem 0.85rem;
    border-radius: 7px;
    font-family: var(--mono);
    font-size: 0.85rem;
    transition: border-color 0.15s, box-shadow 0.15s;
    outline: none;
    width: 100%;
  }

  input:focus, select:focus, textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(124,106,247,0.15);
  }

  select option { background: var(--surface2); }

  .radio-group {
    display: flex;
    gap: 0.75rem;
  }

  .radio-btn {
    flex: 1;
    position: relative;
  }

  .radio-btn input[type="radio"] {
    position: absolute;
    opacity: 0;
    width: 0;
  }

  .radio-btn label {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.4rem;
    padding: 0.65rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 7px;
    cursor: pointer;
    font-size: 0.8rem;
    text-transform: none;
    letter-spacing: 0;
    font-family: var(--sans);
    font-weight: 600;
    transition: all 0.15s;
    color: var(--muted);
  }

  .radio-btn input[type="radio"]:checked + label {
    border-color: var(--accent);
    background: rgba(124,106,247,0.12);
    color: var(--accent);
  }

  .btn {
    padding: 0.75rem 1.5rem;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-family: var(--sans);
    font-weight: 700;
    font-size: 0.85rem;
    transition: all 0.15s;
    letter-spacing: 0.02em;
  }

  .btn-primary {
    background: var(--accent);
    color: white;
  }
  .btn-primary:hover { background: #9585fa; transform: translateY(-1px); }

  .btn-ghost {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { color: var(--text); border-color: var(--muted); }

  .btn-danger {
    background: transparent;
    color: var(--danger);
    border: 1px solid transparent;
    padding: 0.4rem 0.6rem;
    font-size: 0.8rem;
  }
  .btn-danger:hover { background: rgba(247,106,106,0.1); border-color: var(--danger); }

  .btn-edit {
    background: transparent;
    color: var(--accent2);
    border: 1px solid transparent;
    padding: 0.4rem 0.6rem;
    font-size: 0.8rem;
  }
  .btn-edit:hover { background: rgba(247,194,106,0.1); border-color: var(--accent2); }

  .form-actions {
    display: flex;
    gap: 0.75rem;
    margin-top: 1.5rem;
    justify-content: flex-end;
  }

  /* ---- TABLE VIEW ---- */
  .toolbar {
    display: flex;
    gap: 1rem;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
    align-items: center;
  }

  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 200px;
    max-width: 380px;
  }

  .search-wrap input {
    padding-left: 2.2rem;
  }

  .search-icon {
    position: absolute;
    left: 0.75rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 0.85rem;
    pointer-events: none;
  }

  .filter-group {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
  }

  .filter-chip {
    padding: 0.4rem 0.85rem;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 0.75rem;
    cursor: pointer;
    font-family: var(--sans);
    font-weight: 600;
    transition: all 0.15s;
  }
  .filter-chip:hover { color: var(--text); }
  .filter-chip.active { background: var(--accent); border-color: var(--accent); color: white; }

  .table-wrap {
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: 12px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.82rem;
  }

  thead th {
    padding: 0.85rem 1rem;
    text-align: left;
    font-family: var(--mono);
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
  }
  thead th:hover { color: var(--text); }
  thead th.sort-asc::after { content: ' ↑'; color: var(--accent); }
  thead th.sort-desc::after { content: ' ↓'; color: var(--accent); }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--surface2); }

  td {
    padding: 0.8rem 1rem;
    vertical-align: middle;
    white-space: nowrap;
  }

  td.name-cell {
    font-weight: 700;
    font-size: 0.88rem;
  }

  td.index-cell {
    font-family: var(--mono);
    color: var(--muted);
    font-size: 0.78rem;
  }

  td.date-cell {
    font-family: var(--mono);
    font-size: 0.78rem;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
    padding: 0.25rem 0.65rem;
    border-radius: 20px;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.03em;
    font-family: var(--mono);
  }

  .badge-kolokvijum { background: rgba(124,106,247,0.2); color: var(--accent); }
  .badge-domaci { background: rgba(247,194,106,0.2); color: var(--accent2); }
  .badge-placeno { background: rgba(106,247,168,0.2); color: var(--success); }
  .badge-ceka { background: rgba(247,106,106,0.2); color: var(--danger); }

  .actions-cell {
    display: flex;
    gap: 0.25rem;
  }

  .empty-state {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--muted);
  }
  .empty-state .empty-icon { font-size: 3rem; margin-bottom: 1rem; opacity: 0.4; }
  .empty-state p { font-size: 0.9rem; }

  /* ---- MODAL ---- */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 500;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 2rem;
    width: 100%;
    max-width: 700px;
    max-height: 90vh;
    overflow-y: auto;
    animation: slideUp 0.2s ease;
  }

  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.5rem;
  }

  .modal-title {
    font-size: 1rem;
    font-weight: 800;
    letter-spacing: -0.02em;
  }

  .close-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 1.2rem;
    padding: 0.2rem;
    transition: color 0.15s;
  }
  .close-btn:hover { color: var(--text); }

  /* ---- TOAST ---- */
  #toast {
    position: fixed;
    bottom: 2rem;
    right: 2rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.85rem 1.25rem;
    font-size: 0.85rem;
    font-weight: 600;
    z-index: 1000;
    transform: translateY(100px);
    opacity: 0;
    transition: all 0.3s;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  #toast.show { transform: translateY(0); opacity: 1; }
  #toast.success { border-color: var(--success); color: var(--success); }
  #toast.error { border-color: var(--danger); color: var(--danger); }

  /* ---- RESPONSIVE ---- */
  @media (max-width: 600px) {
    .main { padding: 1.25rem; }
    header { padding: 1.25rem; }
    .tabs { padding: 0 1.25rem; }
    .form-grid { grid-template-columns: 1fr; }
    .form-group.full { grid-column: 1; }
    .stats-bar { gap: 1rem; }
  }

  /* ---- EXPORT BTN ---- */
  .btn-export {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    font-size: 0.78rem;
    padding: 0.5rem 0.9rem;
  }
  .btn-export:hover { color: var(--accent2); border-color: var(--accent2); }

  .count-badge {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 0.25rem 0.65rem;
    font-family: var(--mono);
    font-size: 0.72rem;
    color: var(--muted);
    margin-left: auto;
  }

  /* ---- TOGGLE PAYMENT ---- */
  .payment-toggle {
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .payment-toggle:hover { opacity: 0.7; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">📋</div>
    Evidencija
  </div>
  <div class="stats-bar">
    <div class="stat">
      <span class="stat-val" id="stat-total">0</span>
      <span class="stat-label">Ukupno</span>
    </div>
    <div class="stat">
      <span class="stat-val" id="stat-neplaceni">0</span>
      <span class="stat-label">Čeka</span>
    </div>
    <div class="stat">
      <span class="stat-val" id="stat-kol">0</span>
      <span class="stat-label">Kol.</span>
    </div>
    <div class="stat">
      <span class="stat-val" id="stat-dom">0</span>
      <span class="stat-label">Dom.</span>
    </div>
  </div>
</header>

<div class="tabs">
  <button class="tab active" onclick="switchTab('pregled')">Pregled</button>
  <button class="tab" onclick="switchTab('dodaj')">+ Dodaj studenta</button>
</div>

<div class="main">

  <!-- PREGLED -->
  <div class="view active" id="view-pregled">
    <div class="toolbar">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="search" placeholder="Pretraži ime, prezime, indeks..." oninput="renderTable()">
      </div>
      <div class="filter-group">
        <button class="filter-chip active" onclick="setFilter('sve', this)">Sve</button>
        <button class="filter-chip" onclick="setFilter('kolokvijum', this)">Kolokvijumi</button>
        <button class="filter-chip" onclick="setFilter('domaci', this)">Domaći</button>
        <button class="filter-chip" onclick="setFilter('ceka', this)">🔴 Čeka naplatu</button>
        <button class="filter-chip" onclick="setFilter('placeno', this)">✅ Plaćeno</button>
      </div>
      <span class="count-badge" id="count-badge">0 studenata</span>
      <button class="btn btn-export" onclick="exportCSV()">⬇ CSV</button>
    </div>

    <div class="table-wrap">
      <table id="main-table">
        <thead>
          <tr>
            <th onclick="sortBy('ime')">Ime i prezime</th>
            <th onclick="sortBy('indeks')">Indeks</th>
            <th onclick="sortBy('tip')">Tip</th>
            <th onclick="sortBy('datum')">Datum / Dan</th>
            <th onclick="sortBy('vreme')">Vreme</th>
            <th onclick="sortBy('status')">Uplata</th>
            <th>Akcije</th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
  </div>

  <!-- DODAJ -->
  <div class="view" id="view-dodaj">
    <div class="form-card">
      <div class="form-title">Novi student</div>
      <div class="form-grid">
        <div class="form-group">
          <label>Ime</label>
          <input type="text" id="f-ime" placeholder="Marko">
        </div>
        <div class="form-group">
          <label>Prezime</label>
          <input type="text" id="f-prezime" placeholder="Marković">
        </div>
        <div class="form-group">
          <label>Broj indeksa</label>
          <input type="text" id="f-indeks" placeholder="SW-123/2023">
        </div>
        <div class="form-group">
          <label>Vreme</label>
          <input type="time" id="f-vreme">
        </div>
        <div class="form-group full">
          <label>Datum ili dan termina</label>
          <input type="text" id="f-datum" placeholder="npr. 15.04.2025. ili Sreda 16:00">
        </div>
        <div class="form-group full">
          <label>Tip obaveze</label>
          <div class="radio-group">
            <div class="radio-btn">
              <input type="radio" name="tip" id="r-kol" value="kolokvijum" checked>
              <label for="r-kol">📝 Kolokvijum</label>
            </div>
            <div class="radio-btn">
              <input type="radio" name="tip" id="r-dom" value="domaci">
              <label for="r-dom">🏠 Domaći</label>
            </div>
          </div>
        </div>
        <div class="form-group full">
          <label>Status uplate</label>
          <div class="radio-group">
            <div class="radio-btn">
              <input type="radio" name="status" id="r-ceka" value="ceka" checked>
              <label for="r-ceka">⏳ Čeka rezultat</label>
            </div>
            <div class="radio-btn">
              <input type="radio" name="status" id="r-plac" value="placeno">
              <label for="r-plac">✅ Plaćeno</label>
            </div>
          </div>
        </div>
        <div class="form-group full">
          <label>Napomena (opciono)</label>
          <input type="text" id="f-napomena" placeholder="Slobodan komentar...">
        </div>
      </div>
      <div class="form-actions">
        <button class="btn btn-ghost" onclick="clearForm()">Obriši</button>
        <button class="btn btn-primary" onclick="saveStudent()">Sačuvaj studenta</button>
      </div>
    </div>
  </div>

</div>

<!-- MODAL EDIT -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Izmeni podatke</div>
      <button class="close-btn" onclick="closeModalDirect()">✕</button>
    </div>
    <div class="form-grid">
      <div class="form-group">
        <label>Ime</label>
        <input type="text" id="e-ime">
      </div>
      <div class="form-group">
        <label>Prezime</label>
        <input type="text" id="e-prezime">
      </div>
      <div class="form-group">
        <label>Indeks</label>
        <input type="text" id="e-indeks">
      </div>
      <div class="form-group">
        <label>Vreme</label>
        <input type="time" id="e-vreme">
      </div>
      <div class="form-group full">
        <label>Datum / Dan</label>
        <input type="text" id="e-datum">
      </div>
      <div class="form-group full">
        <label>Tip</label>
        <div class="radio-group">
          <div class="radio-btn">
            <input type="radio" name="etip" id="er-kol" value="kolokvijum">
            <label for="er-kol">📝 Kolokvijum</label>
          </div>
          <div class="radio-btn">
            <input type="radio" name="etip" id="er-dom" value="domaci">
            <label for="er-dom">🏠 Domaći</label>
          </div>
        </div>
      </div>
      <div class="form-group full">
        <label>Status uplate</label>
        <div class="radio-group">
          <div class="radio-btn">
            <input type="radio" name="estatus" id="er-ceka" value="ceka">
            <label for="er-ceka">⏳ Čeka rezultat</label>
          </div>
          <div class="radio-btn">
            <input type="radio" name="estatus" id="er-plac" value="placeno">
            <label for="er-plac">✅ Plaćeno</label>
          </div>
        </div>
      </div>
      <div class="form-group full">
        <label>Napomena</label>
        <input type="text" id="e-napomena">
      </div>
    </div>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="closeModalDirect()">Odustani</button>
      <button class="btn btn-primary" onclick="saveEdit()">Sačuvaj izmene</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
  let students = JSON.parse(localStorage.getItem('studenti') || '[]');
  let currentFilter = 'sve';
  let sortCol = 'datum';
  let sortDir = 1;
  let editId = null;

  function save() {
    localStorage.setItem('studenti', JSON.stringify(students));
    updateStats();
    renderTable();
  }

  function updateStats() {
    const t = students;
    document.getElementById('stat-total').textContent = t.length;
    document.getElementById('stat-neplaceni').textContent = t.filter(s => s.status === 'ceka').length;
    document.getElementById('stat-kol').textContent = t.filter(s => s.tip === 'kolokvijum').length;
    document.getElementById('stat-dom').textContent = t.filter(s => s.tip === 'domaci').length;
  }

  function renderTable() {
    const q = document.getElementById('search').value.toLowerCase();
    let data = students.filter(s => {
      const match = (s.ime + ' ' + s.prezime + ' ' + s.indeks).toLowerCase().includes(q);
      if (!match) return false;
      if (currentFilter === 'sve') return true;
      if (currentFilter === 'kolokvijum') return s.tip === 'kolokvijum';
      if (currentFilter === 'domaci') return s.tip === 'domaci';
      if (currentFilter === 'placeno') return s.status === 'placeno';
      if (currentFilter === 'ceka') return s.status === 'ceka';
      return true;
    });

    data.sort((a, b) => {
      let va = a[sortCol] || '';
      let vb = b[sortCol] || '';
      return va.localeCompare(vb) * sortDir;
    });

    const tbody = document.getElementById('table-body');
    document.getElementById('count-badge').textContent = data.length + ' studenata';

    // update sort indicators
    document.querySelectorAll('thead th').forEach(th => {
      th.classList.remove('sort-asc', 'sort-desc');
      const col = th.getAttribute('onclick')?.match(/'(\w+)'/)?.[1];
      if (col === sortCol) th.classList.add(sortDir === 1 ? 'sort-asc' : 'sort-desc');
    });

    if (data.length === 0) {
      tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state">
        <div class="empty-icon">📭</div>
        <p>Nema studenata koji odgovaraju filteru.</p>
      </div></td></tr>`;
      return;
    }

    tbody.innerHTML = data.map(s => {
      const tipBadge = s.tip === 'kolokvijum'
        ? `<span class="badge badge-kolokvijum">📝 Kolokvijum</span>`
        : `<span class="badge badge-domaci">🏠 Domaći</span>`;
      const statusBadge = s.status === 'placeno'
        ? `<span class="badge badge-placeno payment-toggle" onclick="togglePayment('${s.id}')" title="Klikni za promenu">✅ Plaćeno</span>`
        : `<span class="badge badge-ceka payment-toggle" onclick="togglePayment('${s.id}')" title="Klikni za promenu">⏳ Čeka</span>`;
      const napomenaStr = s.napomena ? `<br><span style="color:var(--muted);font-size:0.72rem;font-family:var(--mono)">${s.napomena}</span>` : '';
      return `<tr>
        <td class="name-cell">${esc(s.ime)} ${esc(s.prezime)}${napomenaStr}</td>
        <td class="index-cell">${esc(s.indeks)}</td>
        <td>${tipBadge}</td>
        <td class="date-cell">${esc(s.datum)}</td>
        <td class="date-cell">${esc(s.vreme)}</td>
        <td>${statusBadge}</td>
        <td><div class="actions-cell">
          <button class="btn btn-edit" onclick="openEdit('${s.id}')">✏</button>
          <button class="btn btn-danger" onclick="deleteStudent('${s.id}')">🗑</button>
        </div></td>
      </tr>`;
    }).join('');
  }

  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t,i) => {
      t.classList.toggle('active', (i === 0 && tab === 'pregled') || (i === 1 && tab === 'dodaj'));
    });
    document.getElementById('view-pregled').classList.toggle('active', tab === 'pregled');
    document.getElementById('view-dodaj').classList.toggle('active', tab === 'dodaj');
  }

  function setFilter(f, btn) {
    currentFilter = f;
    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    renderTable();
  }

  function sortBy(col) {
    if (sortCol === col) sortDir *= -1;
    else { sortCol = col; sortDir = 1; }
    renderTable();
  }

  function saveStudent() {
    const ime = document.getElementById('f-ime').value.trim();
    const prezime = document.getElementById('f-prezime').value.trim();
    const indeks = document.getElementById('f-indeks').value.trim();
    const vreme = document.getElementById('f-vreme').value.trim();
    const datum = document.getElementById('f-datum').value.trim();
    const tip = document.querySelector('input[name="tip"]:checked').value;
    const status = document.querySelector('input[name="status"]:checked').value;
    const napomena = document.getElementById('f-napomena').value.trim();

    if (!ime || !prezime) { showToast('Ime i prezime su obavezni!', 'error'); return; }
    if (!indeks) { showToast('Unesite broj indeksa!', 'error'); return; }

    students.push({
      id: Date.now().toString(36) + Math.random().toString(36).slice(2),
      ime, prezime, indeks, vreme, datum, tip, status, napomena
    });
    save();
    clearForm();
    switchTab('pregled');
    showToast('Student dodat! ✓', 'success');
  }

  function clearForm() {
    ['f-ime','f-prezime','f-indeks','f-vreme','f-datum','f-napomena'].forEach(id => {
      document.getElementById(id).value = '';
    });
    document.getElementById('r-kol').checked = true;
    document.getElementById('r-ceka').checked = true;
  }

  function deleteStudent(id) {
    if (!confirm('Obrisati studenta?')) return;
    students = students.filter(s => s.id !== id);
    save();
    showToast('Student obrisan.', 'success');
  }

  function togglePayment(id) {
    const s = students.find(x => x.id === id);
    if (!s) return;
    s.status = s.status === 'placeno' ? 'ceka' : 'placeno';
    save();
    showToast(s.status === 'placeno' ? '✅ Označeno kao plaćeno' : '⏳ Vraćeno na čeka', 'success');
  }

  function openEdit(id) {
    const s = students.find(x => x.id === id);
    if (!s) return;
    editId = id;
    document.getElementById('e-ime').value = s.ime;
    document.getElementById('e-prezime').value = s.prezime;
    document.getElementById('e-indeks').value = s.indeks;
    document.getElementById('e-vreme').value = s.vreme;
    document.getElementById('e-datum').value = s.datum;
    document.getElementById('e-napomena').value = s.napomena || '';
    document.querySelector(`input[name="etip"][value="${s.tip}"]`).checked = true;
    document.querySelector(`input[name="estatus"][value="${s.status}"]`).checked = true;
    document.getElementById('modal-overlay').classList.add('open');
  }

  function saveEdit() {
    const s = students.find(x => x.id === editId);
    if (!s) return;
    s.ime = document.getElementById('e-ime').value.trim();
    s.prezime = document.getElementById('e-prezime').value.trim();
    s.indeks = document.getElementById('e-indeks').value.trim();
    s.vreme = document.getElementById('e-vreme').value.trim();
    s.datum = document.getElementById('e-datum').value.trim();
    s.tip = document.querySelector('input[name="etip"]:checked').value;
    s.status = document.querySelector('input[name="estatus"]:checked').value;
    s.napomena = document.getElementById('e-napomena').value.trim();
    save();
    closeModalDirect();
    showToast('Izmene sačuvane ✓', 'success');
  }

  function closeModal(e) {
    if (e.target === document.getElementById('modal-overlay')) closeModalDirect();
  }
  function closeModalDirect() {
    document.getElementById('modal-overlay').classList.remove('open');
    editId = null;
  }

  function exportCSV() {
    const header = ['Ime','Prezime','Indeks','Datum','Vreme','Tip','Status','Napomena'];
    const rows = students.map(s => [s.ime,s.prezime,s.indeks,s.datum,s.vreme,s.tip,s.status,s.napomena||'']
      .map(v => `"${v}"`).join(','));
    const csv = [header.join(','), ...rows].join('\n');
    const a = document.createElement('a');
    a.href = 'data:text/csv;charset=utf-8,\uFEFF' + encodeURIComponent(csv);
    a.download = 'kolokvijumi.csv';
    a.click();
    showToast('CSV exportovan ✓', 'success');
  }

  let toastTimer;
  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `show ${type}`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.className = '', 2800);
  }

  // Init
  updateStats();
  renderTable();
</script>
</body>
</html>
